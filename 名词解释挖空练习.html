<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📖 名词解释 · 挖空记忆练习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #F0F8FF;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            padding: 20px;
            color: #1E293B;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        header {
            background: #0AA5F2;
            color: white;
            padding: 20px 25px;
            border-radius: 16px;
            box-shadow: 0 4px 12px rgba(10,165,242,0.3);
            margin-bottom: 24px;
        }
        header h1 {
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        header h1 i {
            font-size: 2rem;
        }
        .header-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 20px 30px;
            margin-top: 8px;
            font-size: 0.95rem;
            opacity: 0.95;
        }
        .header-stats span {
            background: rgba(255,255,255,0.2);
            padding: 4px 14px;
            border-radius: 30px;
        }
        .mode-switch {
            margin: 12px 0 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .mode-btn {
            background: white;
            border: 2px solid #B8D4E8;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: #1E293B;
        }
        .mode-btn.active {
            background: #0AA5F2;
            border-color: #0AA5F2;
            color: white;
        }
        .mode-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* 分类折叠 */
        details {
            background: white;
            border-radius: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            margin-bottom: 16px;
            border: 1px solid #DBEAFE;
            overflow: hidden;
        }
        summary {
            padding: 14px 20px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            background: #F8FAFC;
            border-bottom: 1px solid #DBEAFE;
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
            list-style: none;
        }
        summary::-webkit-details-marker {
            display: none;
        }
        summary::after {
            content: "▶";
            margin-left: auto;
            font-size: 0.8rem;
            color: #94A3B8;
            transition: transform 0.25s;
        }
        details[open] summary::after {
            transform: rotate(90deg);
        }
        summary i {
            color: #0AA5F2;
            width: 24px;
        }

        .cards-container {
            padding: 16px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* 单个卡片 */
        .card-item {
            background: #F8FAFC;
            border-radius: 12px;
            padding: 16px 18px;
            border-left: 4px solid #B8D4E8;
            transition: border-color 0.2s, background 0.2s;
        }
        .card-item.correct {
            border-left-color: #10B981;
            background: #ECFDF5;
        }
        .card-item.wrong {
            border-left-color: #EF4444;
            background: #FEF2F2;
        }
        .card-item .hint {
            font-size: 0.95rem;
            color: #334155;
            margin-bottom: 8px;
        }
        .card-item .hint strong {
            color: #0AA5F2;
        }
        .card-item .hint .def-text {
            color: #475569;
            font-size: 0.9rem;
            display: block;
            margin-top: 4px;
            border-top: 1px dashed #E2E8F0;
            padding-top: 6px;
        }
        .card-item .row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }
        .card-item input {
            flex: 1;
            min-width: 150px;
            padding: 8px 14px;
            border: 2px solid #CBD5E1;
            border-radius: 30px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
            background: white;
        }
        .card-item input:focus {
            border-color: #0AA5F2;
        }
        .card-item .btn-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .card-item .btn-check {
            background: #0AA5F2;
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.9rem;
        }
        .card-item .btn-check:hover {
            background: #0891D0;
        }
        .card-item .btn-show {
            background: #E2E8F0;
            border: none;
            color: #1E293B;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.9rem;
        }
        .card-item .btn-show:hover {
            background: #CBD5E1;
        }
        .card-item .feedback {
            margin-top: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .card-item .feedback .correct-answer {
            font-weight: 400;
            color: #475569;
        }
        .card-item .feedback .correct-answer code {
            background: #E2E8F0;
            padding: 0 8px;
            border-radius: 12px;
            font-weight: 600;
        }
        .card-item .feedback .icon {
            font-size: 1.2rem;
        }

        .reset-btn {
            background: white;
            border: 2px solid #CBD5E1;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .reset-btn:hover {
            background: #F1F5F9;
            border-color: #94A3B8;
        }

        .footer-note {
            text-align: center;
            color: #64748B;
            font-size: 0.85rem;
            margin-top: 30px;
            border-top: 1px solid #DBEAFE;
            padding-top: 20px;
        }

        @media (max-width: 600px) {
            .card-item .row {
                flex-direction: column;
                align-items: stretch;
            }
            .card-item .btn-group {
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
<div class="container">

    <header>
        <h1><i class="fas fa-book-open" style="font-style:normal;">📖</i> 名词解释 · 挖空记忆</h1>
        <div class="header-stats">
            <span>📊 已答 <span id="answeredCount">0</span> / <span id="totalCount">0</span></span>
            <span>✅ 正确 <span id="correctCount">0</span></span>
            <span>❌ 错误 <span id="wrongCount">0</span></span>
        </div>
    </header>

    <div class="mode-switch">
        <button class="mode-btn active" data-mode="plain">💬 看大白话 → 填术语</button>
        <button class="mode-btn" data-mode="def">📘 看专业解释 → 填术语</button>
    </div>

    <div id="cardsContainer"></div>

    <button class="reset-btn" id="resetBtn">🔄 重置所有进度</button>

    <div class="footer-note">
        💡 输入术语（支持中英文/别名），按回车或点击“检查”即可核对。
    </div>
</div>

<script>

        { term: "Elementor", def: "WordPress 页面构建器，拖拽式设计", plain: "拖拖拽拽就能设计网页，不用写一行代码" },
        { term: "Rank Math / Yoast", def: "WordPress SEO 插件", plain: "SEO 小助手，提醒你标题写了没、关键词用对了没" },
        { term: "WP Rocket", def: "WordPress 付费缓存插件", plain: "把做好的网页“拍张照片”存起来，下次访问直接给照片，秒开" },
        { term: "Wordfence", def: "WordPress 安全插件", plain: "给网站装“防盗门 + 监控摄像头 + 报警器”" },
        { term: "UpdraftPlus", def: "WordPress 备份插件", plain: "自动把网站“打包”存到云盘，出事了随时恢复" },
        { term: "Cloudflare", def: "全球 CDN + 安全服务", plain: "全球加速 + 防攻击 + 域名管理，一站式服务" },
        { term: "GSC", def: "Google Search Console，官方站长工具", plain: "Google 给站长开的“后台管理系统”，看你的网站在 Google 眼里什么样" }
    ];

    // ============================================================
    // 2. 分类映射（按顺序）
    // ============================================================
    const categoryNames = [
        "搜索引擎与 SEO 基础",
        "SEO 工具指标",
        "Google 算法与标准",
        "技术 SEO",
        "链接建设",
        "Google Ads",
        "数据分析",
        "AI 与前沿",
        "合规与本地化",
        "自建站与技术基建"
    ];
    // 每个分类的起始索引（手动计算）
    const categoryStartIndices = [0, 10, 15, 22, 30, 34, 45, 52, 57, 60];
    // 分类总数
    const totalCategories = categoryNames.length;

    // ============================================================
    // 3. 核心逻辑
    // ============================================================
    let currentMode = 'plain'; // 'plain' 或 'def'
    let progress = {}; // 存储每个术语的答案状态: { index: { answered: true/false, correct: true/false, userInput: '' } }
    let termData = glossaryData;

    // DOM 元素
    const container = document.getElementById('cardsContainer');
    const answeredSpan = document.getElementById('answeredCount');
    const totalSpan = document.getElementById('totalCount');
    const correctSpan = document.getElementById('correctCount');
    const wrongSpan = document.getElementById('wrongCount');

    // 初始化进度
    function initProgress() {
        progress = {};
        termData.forEach((_, idx) => {
            progress[idx] = { answered: false, correct: false, userInput: '' };
        });
    }
    initProgress();

    // 更新统计
    function updateStats() {
        let answered = 0,
            correct = 0,
            wrong = 0;
        for (let key in progress) {
            if (progress[key].answered) {
                answered++;
                if (progress[key].correct) correct++;
                else wrong++;
            }
        }
        answeredSpan.textContent = answered;
        totalSpan.textContent = termData.length;
        correctSpan.textContent = correct;
        wrongSpan.textContent = wrong;
    }

    // 生成卡片 HTML
    function renderCards() {
        let html = '';
        let idx = 0;
        for (let cat = 0; cat < totalCategories; cat++) {
            const start = categoryStartIndices[cat];
            const end = (cat + 1 < totalCategories) ? categoryStartIndices[cat + 1] : termData.length;
            const items = termData.slice(start, end);
            if (items.length === 0) continue;

            html += `<details open>`;
            html += `<summary><i class="fas fa-folder-open" style="font-style:normal;">📂</i> ${categoryNames[cat]}</summary>`;
            html += `<div class="cards-container">`;

            for (let i = 0; i < items.length; i++) {
                const data = items[i];
                const globalIdx = start + i;
                const hintText = currentMode === 'plain' ? data.plain : data.def;
                const termText = data.term;
                const answers = termText.split('/').map(s => s.trim());

                // 进度状态
                const prog = progress[globalIdx];
                const isAnswered = prog.answered;
                const isCorrect = prog.correct;
                const userInput = prog.userInput || '';

                let feedbackHtml = '';
                if (isAnswered) {
                    const icon = isCorrect ? '✅' : '❌';
                    const colorClass = isCorrect ? 'correct' : 'wrong';
                    const answerShow = isCorrect ? '' : `<span class="correct-answer">正确答案：<code>${answers.join(' / ')}</code></span>`;
                    feedbackHtml = `<div class="feedback"><span class="icon">${icon}</span> ${answerShow}</div>`;
                }

                html += `
                    <div class="card-item ${isAnswered ? (isCorrect ? 'correct' : 'wrong') : ''}" data-idx="${globalIdx}">
                        <div class="hint">
                            <strong>${currentMode === 'plain' ? '💬 大白话' : '📘 专业解释'}</strong>
                            <span>：${hintText}</span>
                            ${currentMode === 'plain' ? `<span class="def-text">📖 ${data.def}</span>` : ''}
                        </div>
                        <div class="row">
                            <input type="text" placeholder="输入术语..." value="${userInput}" ${isAnswered ? 'disabled' : ''} />
                            <div class="btn-group">
                                ${!isAnswered ? `<button class="btn-check" data-idx="${globalIdx}">检查</button>` : ''}
                                <button class="btn-show" data-idx="${globalIdx}">${isAnswered ? '重新作答' : '显示答案'}</button>
                            </div>
                        </div>
                        ${feedbackHtml}
                    </div>
                `;
            }

            html += `</div></details>`;
            idx++;
        }
        container.innerHTML = html;
        updateStats();
    }

    // 事件绑定（委托）
    container.addEventListener('click', function(e) {
        const target = e.target;
        // 检查按钮
        if (target.classList.contains('btn-check')) {
            const idx = parseInt(target.dataset.idx);
            const card = target.closest('.card-item');
            const input = card.querySelector('input');
            const userVal = input.value.trim();
            if (!userVal) {
                alert('请先输入答案！');
                return;
            }
            const data = termData[idx];
            const answers = data.term.split('/').map(s => s.trim());
            // 忽略大小写、前后空格
            const matched = answers.some(ans => ans.toLowerCase() === userVal.toLowerCase());
            progress[idx].answered = true;
            progress[idx].correct = matched;
            progress[idx].userInput = userVal;
            renderCards();
            // 重新绑定事件（因为重新渲染了）
            bindEvents();
            return;
        }

        // 显示答案 / 重新作答
        if (target.classList.contains('btn-show')) {
            const idx = parseInt(target.dataset.idx);
            const card = target.closest('.card-item');
            const input = card.querySelector('input');
            const data = termData[idx];
            const answers = data.term.split('/').map(s => s.trim());

            // 如果已经作答，则重置该条目
            if (progress[idx].answered) {
                progress[idx].answered = false;
                progress[idx].correct = false;
                progress[idx].userInput = '';
                renderCards();
                bindEvents();
                return;
            }

            // 否则填入正确答案（第一个）
            input.value = answers[0];
            // 自动触发检查
            const checkBtn = card.querySelector('.btn-check');
            if (checkBtn) checkBtn.click();
            return;
        }
    });

    // 回车键支持（委托）
    container.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const input = e.target;
            if (input.tagName === 'INPUT' && !input.disabled) {
                const card = input.closest('.card-item');
                const checkBtn = card.querySelector('.btn-check');
                if (checkBtn) checkBtn.click();
            }
        }
    });

    // 绑定事件（每次重新渲染后重新挂载，但已经通过委托处理，无需额外操作）
    function bindEvents() {
        // 所有事件已通过委托绑定，无需额外操作
    }

    // 模式切换
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentMode = this.dataset.mode;
            // 重置所有进度（切换模式时清空作答状态）
            initProgress();
            renderCards();
        });
    });

    // 重置所有进度
    document.getElementById('resetBtn').addEventListener('click', function() {
        if (confirm('确定要重置所有进度吗？')) {
            initProgress();
            renderCards();
        }
    });

    // 初始渲染
    renderCards();

    // 额外：当所有条目都答对时，给个彩蛋效果（可选）
    // 这里不实现，保持简洁。
</script>

</body>
</html>
